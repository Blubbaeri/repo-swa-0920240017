<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Estimasi Biaya Kegiatan Mahasiswa</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h1{
    color:#0078D4;
    margin-bottom:10px;
}

.card{
    background:#f8fafc;
    padding:20px;
    border-left:5px solid #0078D4;
    border-radius:8px;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
}

input,select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    margin-top:15px;
    background:#0078D4;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#hasil{
    margin-top:20px;
    background:#eef7ff;
    padding:15px;
    border-radius:8px;
    display:none;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>Sistem Estimasi Biaya Kegiatan Mahasiswa</h1>

<div class="card">
    <p><b>Nama:</b> NAMA KAMU</p>
    <p><b>NIM:</b> NIM KAMU</p>
</div>

<div class="card">
    <h3>Daftar Harga Konsumsi</h3>
    <ul>
        <li>Snack : Rp15.000</li>
        <li>Makan : Rp30.000</li>
        <li>Lengkap : Rp45.000</li>
    </ul>
</div>

<div class="card">

    <h3>Hitung Estimasi Biaya</h3>

    <label>Jumlah Peserta</label>
    <input type="number" id="jumlah" value="40">

    <label>Jenis Konsumsi</label>
    <select id="jenis">
        <option value="snack">Snack</option>
        <option value="makan">Makan</option>
        <option value="lengkap">Lengkap</option>
    </select>

    <button onclick="hitungBiaya()">
        Hitung Estimasi
    </button>

    <div id="hasil"></div>

</div>

<div class="footer">
    Azure Static Web Apps + Azure Functions
</div>

</div>

<script>

async function hitungBiaya(){

    const jumlah = document.getElementById("jumlah").value;
    const jenis = document.getElementById("jenis").value;

    const url =
    "https://func-serverless-017-hcakbceecrgde9eh.eastasia-01.azurewebsites.net/api/EstimasiBiayaKegiatan"
    + "?jumlah=" + jumlah
    + "&jenis=" + jenis;

    const response = await fetch(url);
    const data = await response.json();

    document.getElementById("hasil").style.display = "block";

    document.getElementById("hasil").innerHTML = `
        <h3>Hasil Perhitungan</h3>
        <p>Jumlah Peserta : ${data.jumlah}</p>
        <p>Jenis Konsumsi : ${data.jenis}</p>
        <p>Harga/Peserta : Rp ${data.hargaPerPeserta.toLocaleString('id-ID')}</p>
        <p>Total Biaya : Rp ${data.total.toLocaleString('id-ID')}</p>
    `;
}
</script>

</body>
</html>
